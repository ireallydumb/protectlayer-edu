name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install wheel twine
      
      - name: Run tests
        run: |
          pytest layers/ -v --tb=short
      
      - name: Generate checksums
        run: |
          mkdir -p dist
          echo "Creating release artifacts..."
          # Copy source code
          cp -r docs dist/
          cp -r layers dist/
          cp -r dashboard dist/
          cp -r assets dist/
          cp -r obs_plugin dist/
          cp setup.sh setup.bat requirements.txt README.md LICENSE dist/
          
          # Generate checksums
          cd dist && find . -type f -exec sha256sum {} \; > ../checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/docs/**/*
            dist/layers/**/*
            dist/dashboard/**/*
            dist/setup.sh
            dist/setup.bat
            dist/requirements.txt
            dist/README.md
            dist/LICENSE
            checksums.txt
          body: |
            # ProtectLayer ${{ github.ref }}
            
            ## What's Included
            - Complete source code
            - Documentation
            - Test content metadata
            - Setup scripts
            - Requirements file
            
            ## Installation
            ```bash
            git clone https://github.com/ireallydumb/protectlayer-edu.git
            cd protectlayer-edu
            ./setup.sh
            ```
            
            ## Verify Integrity
            ```bash
            sha256sum -c checksums.txt
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
